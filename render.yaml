services:
  - type: web
    name: realestate-analyzer
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python startup.py && streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.fileWatcherType none
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false        # set manually in Render dashboard — paste Supabase connection string
      - key: PYTHON_VERSION
        value: 3.11.0
